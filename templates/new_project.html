<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Project</title>
</head>
<body>
    <h2>Upload new Project</h2>
    <div>
        <form action="/guide/new_project/add/{{g}}" method="POST" enctype="multipart/form-data">
            
            <label>Project Name</label>
            <input type="text" name="name" required>&nbsp;&nbsp;
            
            <label>Project File</label>
            <input type="file" name="file" required>
            
            <br><br>

            <label>Batch (e.g., 2022-25)</label>
            <input type="text" name="batch" required>

            <label>Academic Year</label>
            <select name="academic_year" id="">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>

            <hr>

            {% for i in range(1, 8) %}
            <div class="student-row" style="margin-bottom: 20px; border-bottom: 1px solid #ccc;">
                <h4>Student {{ i }} {% if i > 3 %}(Optional){% endif %}</h4>
                
                <input type="text" name="roll_no_{{ i }}" placeholder="Roll No" {% if i <= 3 %}required{% endif %}>
                <input type="text" name="name_{{ i }}" placeholder="Student Name">
                
                <label>Course</label>
                <select name="course_{{i}}">
                    <option value="BCA">BCA</option>
                    <option value="BBA">BBA</option>
                    <option value="Bcom">Bcom</option>
                    <option value="BSc">BSc</option>
                    <option value="BA">BA</option>
                </select>

                <label>Section</label>
                <select name="section_{{i}}">
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>
            {% endfor %}

            <div style="margin-top: 20px;">
                <button type="submit" style="padding: 10px 20px; background-color: blue; color: white;">
                    Upload Project and Register Students
                </button>
            </div>
            
        </form>
    </div>
</body>
</html>
