{% extends "base.html" %}

{% block title %}SPARK - {{role}} Login{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 3rem; margin-bottom: 10px;">🔐</div>
            <h2 style="margin: 0; color: var(--sidebar-color);">Login as {{role}}</h2>
            <p style="color: #718096; font-size: 0.9rem;">Please enter your credentials to continue</p>
        </div>

        <form action="" method="post">
            <div style="margin-bottom: 20px;">
                <label for="mail" style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: #4a5568;">E-mail Address</label>
                <input type="email" 
                       id="mail" 
                       name="email" 
                       placeholder="name@sdmcujire.in" 
                       required 
                       style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 25px;">
                <label for="pass" style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: #4a5568;">Password</label>
                <input type="password" 
                       id="pass" 
                       name="password" 
                       placeholder="Enter your password" 
                       required 
                       style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box;">
            </div>

            <input type="submit" 
                   name="submit" 
                   value="LOGIN" 
                   class="btn-prof primary" 
                   style="width: 100%; padding: 14px; font-size: 1rem; font-weight: bold; letter-spacing: 1px; cursor: pointer;">
        </form>

        <div style="margin-top: 25px; text-align: center;">
            <a href="/" style="text-decoration: none; color: var(--primary-blue); font-size: 0.9rem;">← Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
