<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
</head>
<body>
    <h1>Role:Student</h1>
<div>
    <h2>M Nithin Shetty</h2>
    <h5>230841</h5>
</div>
<div>
    <input type="button" value="All Projects">
    <input type="button" value="All Guides">
</div>
<div>
    <input type="text" name="psearch">
    <input type="button" value="Search">
    <label for=""> &nbsp; Filter By Department</label>
    <select name="pdept" id="">
        <option value="All" id="pname">All</option>
        <option value="" id="gname"></option>
    </select>
    <table border="2">
        <tr>
            <th>Project ID</th>
            <th>Project Name</th>
            <th>Guide Name</th>
            <th>Department</th>
            <th>Date</th>
            <th>View/Download</th>
        </tr>
        {%for p in projects %}
        <tr>
            <td>{{p.id}}</td>
            <td>{{p.name}}</td>
            <td>{{p.guide.name}}</td>
            <td>{{p.guide.department}}</td>
            <td>{{p.submission_date}}</td>
            <td><a href="/download/{{p.stored_name}}">Download</a></td>
        </tr>
        {% endfor %}
    </table>
</div>
<div>
    <input type="text" name="gsearch">
    <input type="button" value="Search">
    <label for=""> &nbsp; Filter By Department</label>
    <select name="gdept" id="">
        <option value="">Sanskrit</option>
            <option value="">Kannada</option>
            <option value="">Hindi</option>
            <option value="">English</option>
            <option value="">History</option>
            <option value="">Economics and Rural Development</option>
            <option value="">Political Science</option>
            <option value="">Journalism</option>
            <option value="">Home Science</option>
            <option value="">Physics</option>
            <option value="">Chemistry</option>
            <option value="">Mathematics</option>
            <option value="">Botany</option>
            <option value="">Biotechnology</option>
            <option value="">Statistics</option>
            <option value="">Psychology</option>
            <option value="Computer Science">Computer Science</option>
            <option value="">Commerce</option>
            <option value="">Business Administration</option>
        <option value="All" id="pname">All</option>
        <option value="" id=""></option>
    </select>
    <table border="2">
        <tr>
            <th>Guide ID</th>
            <th>Guide Name</th>
            <th>Department</th>
            <th>Status</th>
            <th>Total Projects</th>
        </tr>
    </table>
</div>
</body>
</html>
