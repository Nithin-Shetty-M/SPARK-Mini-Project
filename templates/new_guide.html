{% extends "base.html" %}

{% block title %}Add New Guide{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 15px;">
        <button class="btn-prof" onclick="window.location.href='/admin/dashboard';" style="padding: 5px 15px;">← Back</button>
        <h2 style="margin: 0;">Register New Faculty Guide</h2>
    </div>

    <div class="card">
        <form action="/admin/new_guide" method="post" style="display: flex; flex-direction: column; gap: 20px;">
            
            <div class="form-group">
                <label for="name" style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Full Name</label>
                <input type="text" name="name" id="name" required placeholder="e.g. Dr. Smith"
                       style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div class="form-group">
                <label for="email" style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Official E-Mail</label>
                <input type="email" name="email" id="email" required placeholder="guide@sdmcujire.in"
                       style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div class="form-group">
                <label for="password" style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Access Password</label>
                <input type="password" name="password" id="password" required placeholder="Create a secure password"
                       style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div class="form-group">
                <label for="dept" style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Department Assignment</label>
                {% if departments %}
                <select name="dept" id="dept" required class="filter-select" style="width: 100%; padding: 10px;">
                    <option value="" disabled selected>Select Department...</option>
                    {% for department in departments %}
                        <option value="{{ department.name }}">{{ department.name }}</option>
                    {% endfor %}
                </select>
                {% else %}
                <p style="margin: 0; color: #e53e3e;">No departments yet. Please add a department from the Admin dashboard first.</p>
                {% endif %}
            </div>

            <hr style="border: 0; border-top: 1px solid #edf2f7; margin: 10px 0;">

            <input type="submit" value="Register Guide" class="btn-prof primary" 
                   style="padding: 12px; font-size: 1rem; font-weight: bold; cursor: pointer;">
        </form>
    </div>
</div>
{% endblock %}
